<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glow d'arrière plan -->
  <circle cx="50" cy="50" r="45" fill="#22d3ee" opacity="0.15" filter="url(#blur)" />
  
  <!-- Filtres de lueur et de flou -->
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Le logo principal en cyan -->
  <g stroke="#22d3ee" stroke-linecap="round">
    <circle cx="50" cy="50" r="30" stroke-width="10" stroke-dasharray="30 20" />
    <path d="M 50 10 L 50 25 M 50 75 L 50 90 M 10 50 L 25 50 M 75 50 L 90 50" stroke-width="12" />
    <path d="M 22 22 L 32 32 M 68 68 L 78 78 M 22 78 L 32 68 M 68 22 L 78 32" stroke-width="12" />
  </g>

  <!-- Point central blanc -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" filter="url(#glow)" />
</svg>
